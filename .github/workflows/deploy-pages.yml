name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Vite must use the same path GitHub Pages serves the site from, or /assets/*.js 404 → blank page.
      # - Project site: https://owner.github.io/repo-name/  → base /repo-name/
      # - User/org site: https://owner.github.io/ (repo often named owner.github.io) → base /
      - name: Resolve Vite base path
        id: vite_base
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          OVERRIDE: ${{ vars.VITE_BASE_PATH }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "path=$OVERRIDE" >> "$GITHUB_OUTPUT"
          elif [ "$REPO_NAME" = "${{ github.repository_owner }}.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.vite_base.outputs.path }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
