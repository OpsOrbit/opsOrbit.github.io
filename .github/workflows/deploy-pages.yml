name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Vite must use the same path GitHub Pages serves the site from, or /assets/*.js 404 → blank page.
      # - Project site: https://owner.github.io/repo-name/  → base /repo-name/
      # - User/org site: https://owner.github.io/ (repo often named owner.github.io) → base /
      # User/org Pages URL is always https://<owner-lowercase>.github.io/ at repo root.
      # Repository name must match <owner>.github.io but GitHub mixes casing (opsorbit vs OpsOrbit) — compare case-insensitively or every asset gets base /RepoName.github.io/ and returns 301 → white screen.
      - name: Resolve Vite base path
        id: vite_base
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          OVERRIDE: ${{ vars.VITE_BASE_PATH }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            BASE="$OVERRIDE"
          else
            repo_lc=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
            owner_lc=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
            if [ "$repo_lc" = "${owner_lc}.github.io" ]; then
              BASE="/"
            else
              BASE="/${REPO_NAME}/"
            fi
          fi
          echo "path=$BASE" >> "$GITHUB_OUTPUT"
          echo "Resolved VITE_BASE_PATH=$BASE (user site uses /)"

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.vite_base.outputs.path }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
