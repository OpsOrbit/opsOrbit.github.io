# Verifies RSS fetch script; JSON is baked at deploy via `npm run build` (prebuild), not committed.
name: Verify official news fetch

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: official-news-verify
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch RSS → public/official-news.json (ephemeral)
        run: node scripts/fetch-official-news.mjs

      - name: Assert snapshot exists
        run: test -f public/official-news.json
