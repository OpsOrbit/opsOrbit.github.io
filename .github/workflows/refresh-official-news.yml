# Fetches allowlisted vendor RSS and commits public/official-news.json.
# Push to default branch triggers Deploy to GitHub Pages (prebuild also refreshes JSON).
name: Refresh official news

on:
  schedule:
    # 06:00 UTC daily (~1 AM US Eastern, depending on DST)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: official-news-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch RSS → public/official-news.json
        run: node scripts/fetch-official-news.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/official-news.json
          if git diff --staged --quiet; then
            echo "No changes to official-news.json"
          else
            git commit -m "chore(news): daily refresh of official-news.json"
            git push
          fi
